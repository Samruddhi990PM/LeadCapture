<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leads Dashboard – STRIVE NZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root { --gold: #FFC300; --gold-dark: #d4a200; --gold-light: #FFD84D; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif; min-height: 100vh;
      background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 50%, #1c1600 100%);
      padding: 28px 16px 60px; position: relative; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; top: -150px; right: -150px;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,195,0,0.12) 0%, transparent 70%);
      filter: blur(50px); pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; bottom: -120px; left: -120px;
      width: 420px; height: 420px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,170,0,0.08) 0%, transparent 70%);
      filter: blur(60px); pointer-events: none; z-index: 0;
    }
    .inner { max-width: 1140px; margin: 0 auto; position: relative; z-index: 1; animation: pageIn 0.65s ease; }

    /* HEADER */
    .dash-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 26px; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo-img-wrap {
      width: 54px; height: 54px; border-radius: 50%; background: #1a1a1a;
      box-shadow: 0 0 0 2px rgba(255,195,0,0.32), 0 0 26px rgba(255,195,0,0.38);
      overflow: hidden; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .header-brand-sub { font-size: 9px; letter-spacing: 0.2em; color: rgba(255,195,0,0.5); text-transform: uppercase; margin-bottom: 3px; }
    .header-brand-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; color: #fff; }
    .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .count-badge { background: rgba(255,195,0,0.12); border: 1px solid rgba(255,195,0,0.28); color: var(--gold); font-size: 11px; font-weight: 500; padding: 5px 14px; border-radius: 30px; }
    .csv-btn { background: linear-gradient(135deg, var(--gold-light), var(--gold)); border: none; border-radius: 9px; padding: 9px 18px; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600; color: #1a1200; cursor: pointer; box-shadow: 0 3px 14px rgba(255,195,0,0.35); transition: transform 0.2s, box-shadow 0.2s; }
    .csv-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 20px rgba(255,195,0,0.45); }
    .back-link { font-size: 13px; color: rgba(255,195,0,0.55); text-decoration: none; border-bottom: 1px dashed rgba(255,195,0,0.2); padding-bottom: 1px; transition: color 0.2s; }
    .back-link:hover { color: rgba(255,195,0,0.85); }

    /* SEARCH */
    .search-row { margin-bottom: 16px; }
    .search-input { width: 100%; max-width: 380px; padding: 12px 20px; border-radius: 12px; border: 1.5px solid rgba(255,195,0,0.22); background: rgba(255,255,255,0.07); color: #fff; font-family: 'Outfit', sans-serif; font-size: 14px; outline: none; backdrop-filter: blur(10px); transition: border-color 0.25s; }
    .search-input::placeholder { color: rgba(255,255,255,0.3); }
    .search-input:focus { border-color: rgba(255,195,0,0.5); background: rgba(255,255,255,0.1); }

    /* CARD */
    .card { background: linear-gradient(160deg, rgba(255,255,255,0.975), rgba(255,252,236,0.985)); border-radius: 20px; overflow: hidden; box-shadow: 0 8px 70px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,195,0,0.16); margin-bottom: 20px; }
    .card-bar { height: 4px; background: linear-gradient(90deg, #d4a200, #FFD700, #FFC300, #ffe066, #FFC300, #d4a200); background-size: 300% auto; animation: barSlide 3s linear infinite; }

    /* TABLE */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-family: 'Outfit', sans-serif; }
    thead tr { border-bottom: 2px solid rgba(255,195,0,0.15); }
    th { padding: 14px 18px; text-align: left; font-size: 10px; font-weight: 600; letter-spacing: 0.13em; text-transform: uppercase; color: #9a8a6a; white-space: nowrap; }
    tr { border-bottom: 1px solid rgba(0,0,0,0.045); transition: background 0.15s; }
    tr:hover td { background: rgba(255,195,0,0.04); }
    td { padding: 13px 18px; font-size: 13px; color: #2a2000; vertical-align: middle; }
    .td-id { color: #bbb; font-size: 11px; font-weight: 500; }
    .td-company { font-weight: 600; color: #1a1200; }
    .td-email { color: #8a6000; }
    .td-units { text-align: center; font-weight: 500; }
    .td-comment { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #6a5a40; font-weight: 300; }
    .td-date { color: #9a8a6a; font-size: 11px; white-space: nowrap; }
    .row-even { background: rgba(255,195,0,0.025); }

    /* STATES */
    .center-state { padding: 70px 20px; text-align: center; }
    .spinner { width: 40px; height: 40px; border-radius: 50%; margin: 0 auto 16px; border: 3px solid rgba(255,195,0,0.18); border-top-color: var(--gold); animation: spin 0.75s linear infinite; }
    .state-text { font-size: 14px; color: #9a8a6a; }

    /* STATS */
    .stats-row { display: flex; gap: 14px; flex-wrap: wrap; }
    .stat-card { flex: 1; min-width: 130px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,195,0,0.14); border-radius: 14px; padding: 18px 22px; text-align: center; }
    .stat-val { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 700; color: var(--gold); line-height: 1; margin-bottom: 6px; }
    .stat-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 0.12em; text-transform: uppercase; }

    @keyframes pageIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes barSlide { 0% { background-position: 0% center; } 100% { background-position: 300% center; } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

      </div>
      <div>
        <p class="header-brand-sub">STRIVE New Zealand</p>
        <h1 class="header-brand-title">Leads Dashboard</h1>
      </div>
    </div>
    <div class="header-right">
      <span class="count-badge" id="countBadge">Loading…</span>
      <button class="csv-btn" onclick="downloadCSV()">↓ Export CSV</button>
      <a href="index.html" class="back-link">← Back to Form</a>
    </div>
  </div>

  <div class="search-row">
    <input class="search-input" type="text" id="searchInput" placeholder="Search by company, email or phone…" oninput="renderTable()" />
  </div>

  <div class="card">
    <div class="card-bar"></div>
    <div id="tableContainer">
      <div class="center-state"><div class="spinner"></div><p class="state-text">Loading leads…</p></div>
    </div>
  </div>

  <div class="stats-row" id="statsRow" style="display:none;">
    <div class="stat-card"><div class="stat-val" id="statTotal">0</div><div class="stat-label">Total Leads</div></div>
    <div class="stat-card"><div class="stat-val" id="statAvgUnits">0</div><div class="stat-label">Avg Units</div></div>
    <div class="stat-card"><div class="stat-val" id="statMonth">0</div><div class="stat-label">This Month</div></div>
  </div>
</div>

<script>
  let allLeads = [];
  let dataSource = '';

  async function loadLeads() {
    let blobError = '';
    try {
      const res = await fetch('/api/leads');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'HTTP ' + res.status);
      allLeads = data.leads || [];
      dataSource = 'blob';
    } catch (e) {
      blobError = e.message;
      allLeads = JSON.parse(localStorage.getItem('strive_leads') || '[]');
      dataSource = 'local';
    }

    // Show status banner
    const banner = document.getElementById('statusBanner');
    if (dataSource === 'local') {
      banner.style.display = 'block';
      banner.innerHTML = '⚠ Blob API error: <strong>' + blobError + '</strong> — showing ' + allLeads.length + ' locally cached lead(s). <a href="/api/debug" target="_blank" style="color:#FFD700;text-decoration:underline">Run debug check →</a>';
    } else if (dataSource === 'blob' && allLeads.length === 0) {
      banner.style.display = 'block';
      banner.style.background = 'rgba(255,195,0,0.08)';
      banner.style.borderColor = 'rgba(255,195,0,0.25)';
      banner.innerHTML = '✓ Blob connected — no leads yet. Submit the form first.';
    }

    renderTable(); renderStats();
  }

  function renderTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allLeads.filter(l =>
      [l.company_name, l.email, l.contact_number].some(v => v && v.toLowerCase().includes(q))
    );
    document.getElementById('countBadge').textContent = filtered.length + ' lead' + (filtered.length !== 1 ? 's' : '');
    if (filtered.length === 0) {
      document.getElementById('tableContainer').innerHTML = '<div class="center-state"><p class="state-text">' + (allLeads.length === 0 ? 'No leads yet. Submit the form to get started!' : 'No results match your search.') + '</p></div>';
      return;
    }
    const rows = filtered.map((l, i) => '<tr class="' + (i%2===0?'row-even':'') + '"><td class="td-id">' + (l.id||i+1) + '</td><td class="td-company">' + esc(l.company_name) + '</td><td>' + esc(l.contact_number) + '</td><td class="td-email">' + esc(l.email) + '</td><td class="td-units">' + (l.number_of_units||'—') + '</td><td class="td-comment" title="' + esc(l.comments) + '">' + (esc(l.comments)||'—') + '</td><td class="td-date">' + formatDate(l.created_at) + '</td></tr>').join('');
    document.getElementById('tableContainer').innerHTML = '<div class="table-wrap"><table><thead><tr><th>#</th><th>Company</th><th>Phone</th><th>Email</th><th>Units</th><th>Comments</th><th>Date</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
  }

  function renderStats() {
    if (!allLeads.length) return;
    document.getElementById('statsRow').style.display = 'flex';
    document.getElementById('statTotal').textContent = allLeads.length;
    const avg = allLeads.length ? Math.round(allLeads.reduce((a,l)=>a+(parseInt(l.number_of_units)||0),0)/allLeads.length) : 0;
    document.getElementById('statAvgUnits').textContent = avg;
    const now = new Date();
    document.getElementById('statMonth').textContent = allLeads.filter(l=>{ const d=new Date(l.created_at); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); }).length;
  }

  function downloadCSV() {
    if (!allLeads.length) return alert('No leads to export.');
    const headers = ['ID','Company','Contact','Email','Units','Comments','Date'];
    const rows = allLeads.map(l=>[l.id,csvCell(l.company_name),csvCell(l.contact_number),csvCell(l.email),l.number_of_units,csvCell(l.comments),formatDate(l.created_at)]);
    const csv = [headers,...rows].map(r=>r.join(',')).join('\n');
    const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),download:'strive-leads.csv'});
    a.click();
  }

  function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
  function csvCell(v) { return v ? '"'+String(v).replace(/"/g,'""')+'"' : ''; }
  function formatDate(d) { return d ? new Date(d).toLocaleDateString('en-NZ',{day:'2-digit',month:'short',year:'numeric'}) : '—'; }

  loadLeads();
</script>
</body>
</html>
